// 1. YouTube Player - Modified for background and inline support
function onYouTubeIframeAPIReady() {
  ytPlayer = new YT.Player('yt-player', {
    height: '0', width: '0',
    playerVars: { 
      autoplay: 0, 
      controls: 0, 
      disablekb: 1, 
      playsinline: 1, // Fixes mobile background play
      rel: 0 
    },
    events: {
      onReady: () => { ytReady = true; },
      onStateChange: e => {
        if (e.data === YT.PlayerState.PLAYING) { 
          isPlaying = true; 
          updateBtn(); 
          startTimer();
          updateMediaSession(); // Sync with lock screen
        }
        else if (e.data === YT.PlayerState.PAUSED) { 
          isPlaying = false; 
          updateBtn(); 
          stopTimer();
          updateMediaSession(); // Sync pause state
        }
        else if (e.data === YT.PlayerState.ENDED) nextTrack();
      }
    }
  });
}

// 2. PlaySong Function - Now triggers the system notification
function playSong(idx) {
  if (idx < 0 || idx >= pool.length) return;
  const t = pool[idx];
  curIdx = idx; curTrack = t;

  // Your original UI updates
  document.getElementById('title').textContent = t.title;
  document.getElementById('artist').textContent = t.artist;
  document.getElementById('fsTitle').textContent = t.title;
  document.getElementById('fsArtist').textContent = t.artist;
  
  const img = t.thumb.replace('100x100bb','600x600bb');
  document.getElementById('thumb').src = img;
  document.getElementById('fsThumb').src = img;
  document.getElementById('bgBlur').style.backgroundImage = `url(${img})`;

  // Playback logic preserved from your file
  if (t.src === 'it') {
    if (ytPlayer && ytReady) ytPlayer.stopVideo();
    const a = getAudio(); a.src = t.url; a.play();
  } else {
    getAudio().pause();
    if (ytReady) { ytPlayer.loadVideoById(t.id); ytPlayer.playVideo(); }
  }

  isPlaying = true;
  updateBtn();
  renderList();
  
  // NEW: Update the phone's notification bar details
  updateMediaSession();
}

// 3. NEW: Media Session API Function
// This communicates with the phone's lock screen and notification shade
function updateMediaSession() {
  if ('mediaSession' in navigator && curTrack) {
    navigator.mediaSession.metadata = new MediaMetadata({
      title: curTrack.title,
      artist: curTrack.artist,
      album: 'Play For You',
      artwork: [
        { src: curTrack.thumb.replace('100x100bb', '512x512bb'), sizes: '512x512', type: 'image/png' }
      ]
    });

    // Handle Lockscreen / Hardware buttons
    navigator.mediaSession.setActionHandler('play', () => { togglePlay(); });
    navigator.mediaSession.setActionHandler('pause', () => { togglePlay(); });
    navigator.mediaSession.setActionHandler('previoustrack', () => { prevTrack(); });
    navigator.mediaSession.setActionHandler('nexttrack', () => { nextTrack(); });
    
    // Updates the Play/Pause icon state
    navigator.mediaSession.playbackState = isPlaying ? "playing" : "paused";
  }
}

// 4. Toggle Function - Preserved but added notification sync
function togglePlay() {
  if (!curTrack) return;
  if (curTrack.src === 'yt' && ytReady) {
    if (isPlaying) ytPlayer.pauseVideo(); else ytPlayer.playVideo();
  } else if (curTrack.src === 'it') {
    const a = getAudio();
    if (isPlaying) a.pause(); else a.play();
    isPlaying = !isPlaying;
    updateBtn();
    updateMediaSession(); // Sync icon state
  }
}
